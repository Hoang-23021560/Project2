<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản lý Tòa nhà</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold text-primary" href="#">BẤT ĐỘNG SẢN WEB</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-collapse navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link active" th:href="@{/web/building}">Quản lý Tòa nhà</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/web/customer}">Quản lý Khách hàng</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">TÌM KIẾM VÀ QUẢN LÝ TÒA NHÀ</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/web/building}" method="get" class="row g-3 mb-4">
                <div class="col-md-4">
                    <label class="form-label">Tên tòa nhà</label>
                    <input type="text" name="name" th:value="${param.name}" class="form-control" placeholder="Nhập tên...">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Diện tích sàn từ</label>
                    <input type="number" name="rentAreaFrom" th:value="${param.rentAreaFrom}" class="form-control" placeholder="Diện tích tối thiểu...">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Giá thuê từ</label>
                    <input type="number" name="rentPriceFrom" th:value="${param.rentPriceFrom}" class="form-control" placeholder="Giá thuê tối thiểu...">
                </div>
                <div class="col-12 text-end">
                    <button type="submit" class="btn btn-primary px-4">Tìm kiếm</button>
                    <a th:href="@{/web/building}" class="btn btn-secondary">Xóa bộ lọc</a>
                </div>
            </form>

            <hr>

            <div class="table-responsive">
                <table class="table table-bordered table-striped table-hover align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>Tên tòa nhà</th>
                        <th>Địa chỉ đầy đủ</th>
                        <th>Số tầng hầm</th>
                        <th>Diện tích sàn</th>
                        <th>Giá thuê</th>
                        <th>Diện tích thuê</th>
                        <th>Phí môi giới</th>
                        <th>Trạng thái</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="b : ${listBuildings}">
                        <td th:text="${b.name}" class="fw-bold text-success"></td>
                        <td th:text="${b.address}"></td>
                        <td th:text="${b.numberOfBasement}"></td>
                        <td th:text="${b.floorArea}"></td>
                        <td th:text="${b.rentPrice}"></td>
                        <td th:text="${b.rentAreas}"></td>
                        <td th:text="${b.brokerageFee}"></td>
                        <td th:text="${b.emptyArea}" class="text-muted small"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(listBuildings)}">
                        <td colspan="8" class="text-center text-muted py-3">Không tìm thấy tòa nhà nào phù hợp.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
