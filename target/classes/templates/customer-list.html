<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản lý Khách hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold text-primary" href="#">BẤT ĐỘNG SẢN WEB</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:href="@{/web/building}">Quản lý Tòa nhà</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/web/customer}">Quản lý Khách hàng</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0">TÌM KIẾM VÀ QUẢN LÝ KHÁCH HÀNG</h4>
        </div>
        <div class="card-body">
            <form th:action="@{/web/customer}" method="get" class="row g-3 mb-4">
                <div class="col-md-4">
                    <label class="form-label">Tên khách hàng</label>
                    <input type="text" name="name" th:value="${param.name}" class="form-control" placeholder="Nhập tên khách hàng...">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Số điện thoại</label>
                    <input type="text" name="phone" th:value="${param.phone}" class="form-control" placeholder="Nhập số điện thoại...">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Email</label>
                    <input type="text" name="email" th:value="${param.email}" class="form-control" placeholder="Nhập email...">
                </div>
                <div class="col-12 text-end">
                    <button type="submit" class="btn btn-success px-4">Tìm kiếm</button>
                    <a th:href="@{/web/customer}" class="btn btn-secondary">Xóa bộ lọc</a>
                </div>
            </form>

            <hr>

            <div class="table-responsive">
                <table class="table table-bordered table-striped table-hover align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>Tên khách hàng</th>
                        <th>Số điện thoại</th>
                        <th>Email</th>
                        <th>Nhân viên quản lý</th>
                        <th>Hành động</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${listCustomers}">
                        <td th:text="${c.name}" class="fw-bold"></td>
                        <td th:text="${c.phone}"></td>
                        <td th:text="${c.email}"></td>
                        <td>
                                <span th:each="staff : ${c.managerStaffCustomer}"
                                      class="badge bg-info text-dark me-1"
                                      th:text="${staff}"></span>
                        </td>
                        <td>
                            <a th:href="@{/web/transaction(customerId=${c.id})}" class="btn btn-sm btn-outline-primary">
                                Xem Lịch sử giao dịch
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(listCustomers)}">
                        <td colspan="5" class="text-center text-muted py-3">Không tìm thấy khách hàng nào.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
